<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Disaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        #menu.menu-hidden {
            pointer-events: none;
            opacity: 0;
        }

        .menu-title {
            font-size: 60px;
            font-weight: bold;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .menu-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .menu-btn-classic {
            background: #ff6b6b;
            color: white;
        }

        .menu-btn-classic:hover {
            background: #ff5252;
        }

        .menu-btn-survival {
            background: #4ecdc4;
            color: white;
        }

        .menu-btn-survival:hover {
            background: #45b8b0;
        }

        .menu-btn-shop {
            background: #ffd700;
            color: #333;
        }

        .menu-btn-shop:hover {
            background: #ffed4e;
        }

        .hud {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            z-index: 500;
            min-width: 200px;
        }

        .hud-item {
            margin: 10px 0;
            font-weight: bold;
        }

        .hud-label {
            color: #aaa;
            font-size: 14px;
        }

        .hud-value {
            color: #ffd700;
            font-size: 24px;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 500;
            max-width: 250px;
        }

        .control-item {
            margin: 5px 0;
        }

        .key {
            background: #667eea;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
            margin-right: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="menu">
        <div class="menu-title">🚚 DELIVERY DISASTER</div>
        <div class="menu-buttons">
            <button class="menu-btn menu-btn-classic" onclick="startGame('classic')">
                📦 Classic Mode
            </button>
            <button class="menu-btn menu-btn-survival" onclick="startGame('survival')">
                ⏱️ Survival Mode
            </button>
            <button class="menu-btn menu-btn-shop" onclick="openShop()">
                🛍️ Shop
            </button>
        </div>
    </div>

    <div class="hud">
        <div class="hud-item">
            <span class="hud-label">⏱️ TIME</span>
            <div class="hud-value" id="timer">360</div>
        </div>
        <div class="hud-item">
            <span class="hud-label">⭐ SCORE</span>
            <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-item">
            <span class="hud-label">📦 PACKAGES</span>
            <div class="hud-value" id="packages">0/5</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-item"><span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span> - Move</div>
        <div class="control-item"><span class="key">SPACE</span> - Jump</div>
        <div class="control-item">Walk to packages to deliver them!</div>
    </div>

    <script src="bundle.js"></script>
    <script>
        function startGame(mode) {
            const menu = document.getElementById('menu');
            menu.classList.add('menu-hidden');
            
            if (window.game) {
                window.game.cleanup();
            }
            
            // Import and start game
            import('./src/index.js').then(module => {
                if (module.default) {
                    module.default(mode);
                }
            });
        }

        function openShop() {
            alert('🛍️ Shop coming soon!\n\nAvailable skins:\n- Red Racer\n- Blue Speed\n- Gold Luxury\n- Neon Cyber');
        }
    </script>
</body>
</html>
